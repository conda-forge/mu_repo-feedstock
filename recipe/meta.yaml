{% set name = "mu_repo" %}
{% set version = "1.9.0" %}
{% set hash = "f557e46e35a6dd8e1a8735c2a74ea1e60e9280040abc22a472e88eff0d23c5ca" %}
package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/m/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ hash }}

build:
  noarch: python
  entry_points:
    - mu = mu_repo:main_entry_point
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools

  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - mu_repo

  commands:
    - mu --help

about:
  home: http://fabioz.github.io/mu-repo
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Tool to work with multiple git repositories

extra:
  recipe-maintainers:
    - fabioz
    - nicoddemus
